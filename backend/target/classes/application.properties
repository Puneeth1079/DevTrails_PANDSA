spring.application.name=gigshield
server.port=8080

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/gigshield_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=GigShield2026SecretKey@DEVTrailsHackathonSuperSecureBase64KeyForHS256
jwt.expiration=86400000
jwt.admin.expiration=28800000

# ─── Redis ───────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# ─── OTP ─────────────────────────────────────────────────────────────────────
otp.expiry.minutes=5
otp.length=6
otp.max.attempts=3
otp.lockout.minutes=60

# ─── Weather API ─────────────────────────────────────────────────────────────
weather.api.key=YOUR_OPENWEATHERMAP_API_KEY
weather.api.url=https://api.openweathermap.org/data/2.5/weather

# ─── AQI API ─────────────────────────────────────────────────────────────────
aqi.api.key=YOUR_IQAIR_KEY
aqi.api.url=https://api.airvisual.com/v2/city

# ─── ML Microservice ─────────────────────────────────────────────────────────
ml.service.url=http://localhost:8000

# ─── Razorpay (Test Mode) ────────────────────────────────────────────────────
razorpay.key.id=rzp_test_YOUR_KEY
razorpay.key.secret=YOUR_SECRET

# ─── Scheduler ───────────────────────────────────────────────────────────────
trigger.poll.interval.ms=300000

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.gigshield=INFO
logging.level.org.springframework.security=WARN

# ─── Swagger ─────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always