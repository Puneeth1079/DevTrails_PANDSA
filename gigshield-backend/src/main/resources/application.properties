# ============================================================
# GigShield - Spring Boot Configuration
# ============================================================

spring.application.name=gigshield-backend

# --- MySQL Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/gigshield?useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8080

# --- JWT Config ---
app.jwt.secret=GigShield2026SuperSecretKeyForJWTSigning
app.jwt.expiration=86400000

# --- OpenWeatherMap API ---
weather.api.key=YOUR_OPENWEATHERMAP_API_KEY
weather.api.base-url=https://api.openweathermap.org/data/2.5

# --- OpenAQ (AQI) API ---
aqi.api.base-url=https://api.openaq.org/v2

# --- Disruption Monitor Scheduler (every 15 minutes) ---
app.scheduler.interval=900000

# --- Premium Calculation Config ---
premium.basic=29
premium.standard=49
premium.pro=79
premium.coverage.basic=500
premium.coverage.standard=1000
premium.coverage.pro=1800

# --- Fraud Detection Thresholds ---
fraud.auto-reject-score=90
fraud.manual-review-score=70
